<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamflix landing page</title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body>


<style>
  /* ── DESIGN TOKENS ─────────────────────────────────────── */
  :root {
    --bg:        #0e0e0e;
    --surface:   #181818;
    --surface2:  #222222;
    --red:       #e50914;
    --red-dark:  #b20710;
    --white:     #ffffff;
    --muted:     #b3b3b3;
    --dim:       #666666;
    --border:    #2a2a2a;
    --radius:    8px;
    --nav-h:     68px;
    --font-head: 'Bebas Neue', sans-serif;
    --font-body: 'Outfit', sans-serif;
  }

  /* ── RESET ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    overflow-x: hidden;
  }
  a { text-decoration: none; color: inherit; }
  img { display: block; max-width: 100%; }

  .navbar {
    position: sticky; top: 0; z-index: 100;
    height: var(--nav-h);
    background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center;
    padding: 0 48px; gap: 40px;
  }
  .navbar .logo {
    font-family: var(--font-head);
    font-size: 30px; letter-spacing: 2px;
    color: var(--red);
    margin-right: 16px; flex-shrink: 0;
  }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a {
    font-size: 14px; font-weight: 500; color: var(--muted);
    transition: color .2s;
    position: relative;
  }
  .nav-links a.active, .nav-links a:hover { color: var(--white); }
  .nav-links a.active::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
    height: 2px; background: var(--red); border-radius: 2px;
  }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 20px; }
  .search-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 7px 18px;
    font-size: 13px; color: var(--white);
    font-family: var(--font-body);
    width: 200px;
    transition: border-color .2s, background .2s;
  }
  .search-box:focus {
    outline: none; border-color: var(--red);
    background: rgba(255,255,255,0.12);
  }
  .search-box::placeholder { color: var(--dim); }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--red);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: white;
    cursor: pointer; flex-shrink: 0;
    border: 2px solid transparent;
    transition: border-color .2s;
  }
  .avatar:hover { border-color: var(--white); }

  </style>

    <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">STREAMFLIX</a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="index.html">Movies</a>
      <a href="index.html">Series</a>
      <a href="index.html">My List</a>
    </div>
    <div class="nav-right">
      <input type="text" class="search-box" placeholder="🔍  Search movies…">
      <a href="login.html" class="btn btn-red btn-sm">Sign In</a>
    </div>
  </nav>

</body>
</html>
