<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFLix Movie Details</title>
    <link rel="stylesheet" href="src/output.css">
    <script src="https://kit.fontawesome.com/fbf4810423.js" crossorigin="anonymous"></script>
</head>

<body class="bg-[#0e0e0e]">
    <header>
        <nav class="flex justify-between items-center sticky top-0 z-10 h-16 bg-[rgba(0,0,0,0.95)] px-4 md:px-12">

            <div class="flex items-center gap-6">

                <a href="index.html" class="text-[#e50914] font-semibold text-xl md:text-2xl">
                    STREAMFLIX
                </a>

                <div class="hidden md:flex gap-6 text-[#b3b3b3] text-sm font-semibold">
                    <a href="index.html" class="hover:text-white">Home</a>
                    <a href="movie-detail.html" class="text-white">Movies</a>
                    <a href="register.html" class="hover:text-white">Series</a>
                    <a href="login.html" class="hover:text-white">My List</a>
                </div>

            </div>

            <div class="flex items-center gap-3">

                <i class="fa-regular fa-bell text-white text-lg md:text-2xl"></i>

                <img class="rounded-full w-8 md:w-10" src="images/263388807.jpeg" alt="Profile photo">

                <i class="fa-solid fa-caret-down text-white"></i>
            </div>
        </nav>
    </header>

    <!-- Hero section. -->
    <section>
        <div>

            <img class="w-[70%] object-contain text-center mt-5 mx-auto" src="images/Money Heist.jpg"
                alt="money heist poster">

            <div class="mx-56 relative bottom-24">

                <h2 class="text-4xl text-[#e50914] font-bold">STREAMFLIX</h2>

                <div class="flex justify-between text-white">

                    <div class="flex gap-4">
                        <span class="flex items-center pl-3 gap-2 rounded-lg h-12 w-32 bg-[#e50914] font-medium">
                            <i class="fa-solid fa-play"></i><button>Play Now</button>
                        </span>

                        <button class="rounded-lg h-12 w-32 bg-[#2a2a2a] font-medium border">Add to Favorite</button>
                    </div>

                    <div class="text-2xl flex gap-4">
                        <i class="fa-regular fa-thumbs-up"></i>
                        <i class="fa-regular fa-thumbs-down"></i>
                    </div>
                </div>
            </div>
        </div>
    </section>



    <section>

        <div>
            <h1>Money Heist</h1>
            <p>Crime, Adventure</p>
            <p>2026</p>
            <p>2 Hrs 30 Mins</p>
        </div>
    </section>
</body>

</html>
