<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_200%_40%_at_center,rgba(40,0,0,0.9)_0%,black_60%)] overflow-hidden">
    <header>
        <div class="text-red-700 mt-2.5 ml-3.5 text-2xl font-bold max-sm:">STREAMFLIX</div>
    </header>

    <div class="bg-[#18181a] flex flex-col w-[25vw] h-[70vh] px-8 pt-12 mt-24 m-auto border border-[#3b3b3d] rounded-2xl max-sm:flex-col max-sm:w-[60vw] max-sm:h-[70vh]">
        <h1 class="text-white font-bold">SIGN IN</h1>
        <p class="text-gray-400 mt-5 text-sm max-sm:">Welcome back! Stream thousands of movies instantly</p>

         <p id="error-msg" class="text-red-500 text-sm mt-3 hidden max-sm:">since you have chosen to be a dumb user enter your password you fool.</p>



        <label for="email" class="text-gray-400 mt-5 text-sm font-semibold max-sm:">EMAIL ADDRESS</label>
        <input id="shii" type="email" placeholder="Enter your friggin email mf" class="px-2.5 h-[6vh] text-gray-400 bg-[#202124] border border-gray-600 mt-2 rounded-[10px] max-sm:text-[13px]">

        <label for="password" class="text-gray-400 mt-5 text-sm font-semibold max-sm:">PASSWORD</label>
        <input id="meat" type="password" placeholder="now enter you damned password" class="px-2.5 bg-[#202124] h-[6vh] text-gray-400 border border-gray-600 mt-2 rounded-[10px] max-sm:text-[13px]">

        <button class="w-[22vw] bg-red-700 p-2.5 text-white mt-9 rounded-[10px] font-semibold hover:bg-red-900 hover:shadow-sm hover:shadow-[0, 0, 20px rgba(249, 115, 22, 0.6)] transition duration-500 ease-in-out max-sm:w-[50vw]" id="signin-btn">⏵ Sign In</button>


        <div class="flex justify-center gap-2.5 mt-7 max-sm:">
            <p class="border border-gray-700 h-px w-[15vw] mt-2.5 max-sm:"></p>
            <p class="text-sm text-gray-600">or</p>
              <p class="border border-gray-700 h-px w-[15vw] mt-2.5 max-sm:"></p>
        </div>

        <h3 class="text-gray-600 mt-5 text-center">Don't have an account? <a href="#" class="text-red-700"> Register here &rarr;</a></h3>

        <h3 class="text-gray-600 mt-7 text-center">Forgot password</h3>

    </div>

       <script>
        const signinBtn = document.getElementById('signin-btn')
        const emailInput = document.getElementById('shii')
        const passwordInput = document.getElementById('meat')
        const errorMsg = document.getElementById('error-msg')

        signinBtn.addEventListener('click', () => {
            const email = emailInput.value
            const password = passwordInput.value

            if (!email || !password) {
                errorMsg.classList.remove('hidden')
                return
            }

            // Save login state
            localStorage.setItem('isLoggedIn', 'true')
            localStorage.setItem('userEmail', email)

            // Redirect to home page
            window.location.href = 'index.html'
        })
    </script>
</body>
</html>
