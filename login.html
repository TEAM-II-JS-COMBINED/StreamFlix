<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_200%_40%_at_center,rgba(40,0,0,0.9)_0%,black_60%)]">
    <header>
        <div class="text-red-700 mt-2.5 ml-3.5 text-2xl font-bold">STREAMFLIX</div>
    </header>

    <div class="bg-[#18181a] flex flex-col w-[45vw] h-[70vh] px-6 pt-12 mt-24 m-auto border border-[#3b3b3d] rounded-2xl">
        <h1 class="text-white font-bold">SIGN IN</h1>
        <p class="text-gray-400 mt-5 text-sm">Welcome back! Stream thousands of movies instantly</p>


        <label for="email" class="text-gray-400 mt-5 text-sm font-semibold">EMAIL ADDRESS</label>
        <input type="email" placeholder="Enter your friggin email mf" class="px-2.5 h-[6vh] text-gray-400 bg-[#202124] border border-gray-600 mt-2 rounded-[10px]">

        <label for="password" class="text-gray-400 mt-5 text-sm font-semibold">PASSWORD</label>
        <input type="password" placeholder="now enter you damned password" class="px-2.5 bg-[#202124] h-[6vh] text-gray-400 w-[20vw] border border-gray-600 mt-2 rounded-[10px]">

        <button class="w-[19vw] bg-red-700 p-2.5 text-white mt-9 rounded-[10px] font-semibold">Sign In</button>


        <div class="flex justify-center gap-2.5 mt-7">
            <p class="border border-gray-700 h-px w-[15vw] mt-2.5"></p>
            <p class="text-sm text-gray-600">or</p>
              <p class="border border-gray-700 h-px w-[15vw] mt-2.5"></p>
        </div>

        <h3 class="text-gray-600 mt-5 text-center">Don't have an account? <a href="#" class="text-red-700"> Register here &rarr;</a></h3>

        <h3 class="text-gray-600 mt-7 text-center">Forgot password</h3>
    </div>
</body>
</html>
